apiVersion: v1
kind: ServiceAccount
metadata:
  name: flue-explorer-sa
  labels:
    app: flue-explorer
  annotations:
    # Workload Identity: maps this KSA to a GCP service account.
    # The GCP SA needs roles/aiplatform.user for Vertex AI access.
    # Replace with your project's SA email via deploy.sh or kustomize.
    iam.gke.io/gcp-service-account: ""  # Set via deploy.sh
